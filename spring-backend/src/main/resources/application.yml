spring:
  application:
    name: timetable-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/keycloak}
    username: ${SPRING_DATASOURCE_USERNAME:keycloak}
    password: ${SPRING_DATASOURCE_PASSWORD:keycloak}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8181/realms/timetable-realm}

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8181}
  realm: ${KEYCLOAK_REALM:timetable-realm}
  token-url: ${KEYCLOAK_TOKEN_URL:http://localhost:8181/realms/timetable-realm/protocol/openid-connect/token}
  client-id: ${KEYCLOAK_CLIENT_ID:timetable-backend}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8000

management:
  endpoints:
    web:
      exposure:
        include: health,info
